<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <link href="https://fontshare.com[]=clash-grotesk@200,300,400,500,600,700&display=swap" rel="stylesheet">

</head>
<style>
    @font-face {
        font-family: Clash Grotesk;
        /* set name */
        src: url(sansation_light.woff);
        /* url of the font */
    }


    #main-container {
        width: 100%;
        min-width: 100vh;
        height: 100%;
        

    }
    body{
        background-color: #F2F0E6;
    }

    #header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 100px;
        margin-left: 80px;
        margin-right: 80px;
    }

    #links {
        display: flex;
        justify-content: space-between;
    }

    .links {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
    }

    #left-nav h3 {
        font-family: 'Clash Grotesk', sans-serif;
        font-weight: 500;
        font-style: Medium;
        font-size: 28px;
        line-height: 100%;
        letter-spacing: 0%;
    }

    #right-nav {
        display: flex;
        align-items: center;
        gap: 30px;
        top: 30px;


        line-height: 16px;
        letter-spacing: 0%;
    }

    #right-nav span {
        font-family: Inter;
        font-weight: 400;
        font-style: Regular;
        font-size: 15px;
        line-height: 16px;
        letter-spacing: 0%;
    }

    #hiring-btn {
        background-color: black;
        color: white;
        border-radius: 2px;
        height: 16px;
        padding: 10px 16px 10px 16px;
        border-radius: 5px;
    }

    #left-section {
        width: 737px;
        height: 575.9999389648438px;
        margin-left: 80px;
        opacity: 1;
        top: 194px;
        left: 135px;

    }
    #below h1{
        font-family: Inter;
    font-weight: 600;
    font-style: Semi Bold;
    font-size: 84px;

    line-height: 90px;
    letter-spacing: -2%;

    }

    #below p {
       font-family: Inter;
font-weight: 500;
font-style: Medium;
font-size: 20px;
leading-trim: NONE;
line-height: 30px;
letter-spacing: -0.5%;


    }
    #top h4{
        font-family: 'Clash Grotesk', sans-serif;
        font-size: 17px;
    }
    #top{
        display: flex;
        align-items: center;
        
    }
    #star{
        width: 36px;
        height:36px;
    }
    #section-photo{
        position: absolute;
        top: 100px;
        right: 150px;
    }
    #section-1{
        display: flex;
        align-items: center;
    }
    #divider{
        background-color: black;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 100px;
    }
    #divider img{
        height: 80px;
    }
    #divider div{
        color: white;
        
    }
</style>

<body>
    <div id="main-container">
        <header>
            <nav id="header">
                <div id="left-nav">
                    <h3>HireX</h3>
                </div>

                <div id="right-nav">
                    <span class="">Work</span><span>About Us</span><span>Blogs</span><span>FAQs</span><span>Contact
                        us</span><span id="hiring-btn">We're Hiring</span>
                </div>
            </nav>
        </header>

        <section id="section-1">
            <div id="left-section">
                <div id="top">
                    <h4>Welcome to HireX.</h4><img id="star" src="Star 1.png" alt="">
                </div>
                <div id="below">
                    <h1>Award Winning <br> Digital Agency.</h1>
                    <p>Digital Agency offering unique solutions to create <br> digital presence and increase your sales.
                    </p>
                </div>
                <input type="text" placeholder="Your email address">
                <button style="background-color: #FFBB38;">Request Access</button>

            </div>
            <div id=right-section>
                <div id="section-photo">
                    <img src="image.png" alt="">

                </div>


            </div>

        </section>

        <section id="divider">

           <div id="left">
                <h2>GET ACCESS NOW!</h2>
               
           </div>
            <img src="image-fBLQvAFN1-transformed 2.png" alt="">
           <div id="middle"> <h2>GET ACCESS NOW!</h2></div>
            <img src="image-fBLQvAFN1-transformed 2.png" alt="">
           <div id="right"><h2>GET ACCESS NOW!</h2></div>
            <img src="image-fBLQvAFN1-transformed 2.png" alt="">
